name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Unzip Game Files
      run: unzip games-hub.zip

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/android

    - name: Configure Capacitor App Name
      run: |
        npx cap init "Mobile Games Hub" "com.myhub.games" --web-dir=www || true

    - name: Add Android Platform
      run: npx cap add android

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build APK Natively
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MobileGamesHub-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
